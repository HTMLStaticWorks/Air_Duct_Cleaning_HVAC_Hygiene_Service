<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroPure - Log In to Customer Portal</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="index.css">
  
  <!-- Tailwind CSS 3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              light: '#f0f9ff',
              dark: '#0f172a',
              primary: '#0284c7',
              primaryHover: '#0369a1',
              secondary: '#0d9488',
              secondaryHover: '#0f766e',
              accent: '#22c55e',
              navy: '#1e3a8a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col relative">

  <!-- Floating Toggles -->
  <div class="absolute top-6 right-6 flex items-center space-x-3 rtl:space-x-reverse z-50">
    <!-- RTL Toggle -->
    <button class="rtl-toggle px-3 h-10 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center space-x-2 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm rtl:space-x-reverse" aria-label="Toggle Direction">
      <i data-lucide="languages" class="w-4 h-4"></i>
      <span class="rtl-label text-xs font-bold tracking-wider">RTL</span>
    </button>

    <!-- Theme Toggle -->
    <button class="theme-toggle w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm" aria-label="Toggle Theme">
      <i data-lucide="sun" class="sun-icon w-5 h-5 hidden"></i>
      <i data-lucide="moon" class="moon-icon w-5 h-5"></i>
    </button>
  </div>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="flex-grow flex items-center justify-center py-20 relative bg-gradient-to-tr from-sky-50/50 via-white to-white dark:from-slate-900 dark:via-slate-950 dark:to-slate-950 min-h-screen">
    <div class="max-w-md w-full mx-auto px-4">
      <div class="glass-card p-8 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-800 text-left ltr:text-left rtl:text-right">
        
        <div class="flex flex-col items-center mb-8">
          <!-- Logo -->
          <a href="index.html" class="flex items-center space-x-2 rtl:space-x-reverse group mb-6">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-primary to-brand-secondary flex items-center justify-center text-white shadow-md shadow-sky-500/20">
              <i data-lucide="wind" class="w-6 h-6 animate-pulse"></i>
            </div>
            <span class="font-outfit text-2xl font-bold tracking-tight text-slate-900 dark:text-white">
              Aero<span class="text-brand-primary">Pure</span>
            </span>
          </a>
          <h1 class="text-2xl sm:text-3xl font-extrabold font-outfit text-slate-900 dark:text-white text-center">Welcome Back</h1>
          <p class="text-xs text-slate-400 mt-1.5 font-normal text-center">Enter your login credentials to access the AeroPure Portal</p>
        </div>

        <form action="#" class="space-y-5">
          <div>
            <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Registered Email</label>
            <input type="email" id="email" required placeholder="john@example.com" 
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all">
          </div>

          <div>
            <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
            <input type="password" id="password" required placeholder="••••••••" 
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all">
            <div class="mt-2 text-right rtl:text-left">
              <a href="#" class="text-xs font-semibold text-brand-primary hover:text-brand-primaryHover">Forgot Password?</a>
            </div>
          </div>

          <div class="flex items-center justify-between py-1 text-xs sm:text-sm font-medium">
            <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer">
              <input type="checkbox" class="w-4 h-4 rounded text-brand-primary border-slate-300 focus:ring-brand-primary focus:ring-0">
              <span class="text-slate-500 dark:text-slate-400">Remember session</span>
            </label>
          </div>

          <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-brand-primary to-brand-secondary text-white font-semibold text-center shadow-lg shadow-sky-500/20 transition-all transform hover:-translate-y-0.5">
            Log In
          </button>
        </form>

        <div class="mt-6 text-center text-xs sm:text-sm font-medium text-slate-500 dark:text-slate-400">
          New client? <a href="signup.html" class="text-brand-primary hover:text-brand-primaryHover font-bold">Create Account</a>
        </div>

      </div>
    </div>
  </main>

  <!-- ================= SCRIPTS ================= -->
  <script src="main.js"></script>
</body>
</html>
