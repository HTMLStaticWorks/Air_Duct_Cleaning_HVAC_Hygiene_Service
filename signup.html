<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroPure - Create Client Account</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="index.css">
  
  <!-- Tailwind CSS 3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              light: '#f0f9ff',
              dark: '#0f172a',
              primary: '#0284c7',
              primaryHover: '#0369a1',
              secondary: '#0d9488',
              secondaryHover: '#0f766e',
              accent: '#22c55e',
              navy: '#1e3a8a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col relative">

  <!-- Floating Toggles -->
  <div class="absolute top-6 right-6 flex items-center space-x-3 rtl:space-x-reverse z-50">

    <!-- RTL Toggle -->
    <button class="rtl-toggle w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm" aria-label="Toggle Direction">
      <i data-lucide="arrow-left-right" class="w-4 h-4"></i>
    </button>
    
    <!-- Theme Toggle -->
    <button class="theme-toggle w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm" aria-label="Toggle Theme">
      <i data-lucide="sun" class="sun-icon w-5 h-5 hidden"></i>
      <i data-lucide="moon" class="moon-icon w-5 h-5"></i>
    </button>
  </div>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="flex-grow flex items-center justify-center py-20 relative bg-gradient-to-tr from-sky-50/50 via-white to-white dark:from-slate-900 dark:via-slate-950 dark:to-slate-950 min-h-screen">
    <div class="max-w-md w-full mx-auto px-4">
      <div class="glass-card p-8 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-800 text-left ltr:text-left rtl:text-right animate-fade-in-up">
        
        <div class="flex flex-col items-center mb-8">
          <!-- Logo -->
          <a href="index.html" class="flex items-center space-x-2 rtl:space-x-reverse group mb-6">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-primary to-brand-secondary flex items-center justify-center text-white shadow-md shadow-sky-500/20">
              <i data-lucide="wind" class="w-6 h-6 animate-pulse"></i>
            </div>
            <span class="font-outfit text-2xl font-bold tracking-tight text-slate-900 dark:text-white">
              Aero<span class="text-brand-primary">Pure</span>
            </span>
          </a>
          <h1 class="text-2xl sm:text-3xl font-extrabold font-outfit text-slate-900 dark:text-white text-center">Create Account</h1>
          <p class="text-xs text-slate-400 mt-1.5 font-normal text-center">Sign up to schedule and track home hygiene services</p>
        </div>

        <form action="#" class="space-y-4">
          <div>
            <label for="name" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Full Name</label>
            <input type="text" id="name" required placeholder="Enter your full name" 
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all">
          </div>

          <div>
            <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
            <input type="email" id="email" required placeholder="Enter your email address" 
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all">
          </div>

          <div>
            <label for="phone" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Phone Number</label>
            <input type="tel" id="phone" required placeholder="Enter your phone number" 
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all">
          </div>

          <div>
            <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
            <input type="password" id="password" required placeholder="Enter your password" 
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all">
          </div>

          <div>
            <label for="confirm-password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Confirm Password</label>
            <input type="password" id="confirm-password" required placeholder="Confirm your password" 
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-sm focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-all">
          </div>

          <div class="flex items-center py-1 text-xs sm:text-sm font-medium">
            <label class="flex items-start space-x-2.5 rtl:space-x-reverse cursor-pointer">
              <input type="checkbox" required class="mt-0.5 w-4 h-4 rounded text-brand-primary border-slate-300 focus:ring-brand-primary focus:ring-0">
              <span class="text-slate-500 dark:text-slate-400 leading-normal">
                I agree to the <a href="#" class="text-brand-primary hover:underline font-bold">Terms of Service</a> & <a href="#" class="text-brand-primary hover:underline font-bold">Privacy Policy</a>
              </span>
            </label>
          </div>

          <button type="submit" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-brand-primary to-brand-secondary text-white font-semibold text-center shadow-lg shadow-sky-500/20 transition-all transform hover:-translate-y-0.5">
            Register Account
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Or sign up with</span>
          <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
        </div>

        <!-- Social Sign-Up Buttons -->
        <div class="grid grid-cols-3 gap-3">
          <!-- Google -->
          <button type="button" aria-label="Sign up with Google" class="flex items-center justify-center gap-1.5 w-full py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-xs sm:text-sm font-semibold text-slate-700 dark:text-slate-200 transition-all duration-200 shadow-sm hover:shadow-md">
            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google</span>
          </button>

          <!-- Facebook -->
          <button type="button" aria-label="Sign up with Facebook" class="flex items-center justify-center gap-1.5 w-full py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-xs sm:text-sm font-semibold text-slate-700 dark:text-slate-200 transition-all duration-200 shadow-sm hover:shadow-md">
            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="#1877F2">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            <span>Facebook</span>
          </button>

          <!-- Apple -->
          <button type="button" aria-label="Sign up with Apple" class="flex items-center justify-center gap-1.5 w-full py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-xs sm:text-sm font-semibold text-slate-700 dark:text-slate-200 transition-all duration-200 shadow-sm hover:shadow-md">
            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.7-1.13 1.84-.99 2.94.84 0 2.16-.52 2.82-1.33z"/>
            </svg>
            <span>Apple</span>
          </button>
        </div>

        <div class="mt-5 text-center text-xs sm:text-sm font-medium text-slate-500 dark:text-slate-400">
          Already registered? <a href="login.html" class="text-brand-primary hover:text-brand-primaryHover font-bold">Log In</a>
        </div>

      </div>
    </div>
  </main>

  <!-- ================= SCRIPTS ================= -->
  <script src="main.js"></script>
  <script>
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');

    function validatePassword() {
      if (passwordInput.value !== confirmPasswordInput.value) {
        confirmPasswordInput.setCustomValidity("Passwords do not match");
      } else {
        confirmPasswordInput.setCustomValidity('');
      }
    }

    if (passwordInput && confirmPasswordInput) {
      passwordInput.addEventListener('change', validatePassword);
      confirmPasswordInput.addEventListener('keyup', validatePassword);
    }
  </script>
</body>
</html>
